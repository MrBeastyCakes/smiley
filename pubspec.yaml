name: openclaw_client
description: "Native Flutter client for OpenClaw gateway"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_markdown: ^0.7.7
  shimmer: ^3.0.0

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Networking
  web_socket_channel: ^3.0.2
  http: ^1.6.0

  # Crypto / Security
  cryptography: ^2.9.0
  crypto: ^3.0.7

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.5

  # Utilities
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  uuid: ^4.5.3
  logger: ^2.7.0
  collection: ^1.19.1

  # Functional programming
  dartz: ^0.10.1

  # QR / Setup
  mobile_scanner: ^6.0.11

  # Navigation
  go_router: ^15.1.1

  # Platform
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  share_plus: ^10.1.4

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.2

  # Notifications
  flutter_local_notifications: ^19.2.0
  timezone: ^0.10.1

  # Local-first / Offline
  connectivity_plus: ^6.1.4

  # i18n
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  fake_async: ^1.3.3
  golden_toolkit: ^0.15.0
  alchemist: ^0.11.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^3.2.5
  json_serializable: ^6.13.1

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
